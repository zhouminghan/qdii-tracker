name: 🌐 Deploy GitHub Pages

# ─────────────────────────────────────────────────────────
# 把 web/ 目录作为静态站点发布到 GitHub Pages
# 触发时机：
#   · push 到 main 且 web/ 有变动（人工/本地提交）
#   · 手动触发
#
# ⚠️ 数据更新的部署已移至 update-data.yml（同一 job 原子完成），
#    本 workflow 仅作为人工/本地提交的兜底部署，不再依赖 workflow_run 串联。
#    原因：workflow_run 事件不稳定，曾导致"仓库已更新、Pages 仍停在旧数据"反复出现。
# ─────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

# GitHub Pages 需要的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 防并发：同一时间只跑一个 deploy
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: ⚙️ Setup Pages
        uses: actions/configure-pages@v6

      - name: 🏷️ Stamp frontend asset versions
        run: |
          python3 scripts/pipeline/stamp_asset_version.py --version "${GITHUB_SHA::12}"

      - name: 📦 Upload web/ as artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './web'

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
