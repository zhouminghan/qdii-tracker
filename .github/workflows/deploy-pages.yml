name: 🌐 Deploy GitHub Pages

# ─────────────────────────────────────────────────────────
# 把 web/ 目录作为静态站点发布到 GitHub Pages
# 触发时机：
#   · push 到 main 且 web/ 有变动（包括 Actions 自动推的数据更新）
#   · 手动触发
# ─────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

# GitHub Pages 需要的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 防并发：同一时间只跑一个 deploy
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Pages
        uses: actions/configure-pages@v5

      - name: 📦 Upload web/ as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './web'

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
