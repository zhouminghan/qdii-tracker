name: 🔄 更新基金数据

# 自动更新基金数据 workflow
# 触发：工作日多时段增量 + 每月 2 日完整 + 手动
# 多时段：05:00 / 21:30（北京时间期望跑点）→ 凌晨兜底 + 晚间主力
# QDII 净值披露节奏：T 日美股收盘 → T+1 日晚间（北京时间）基金公司披露 T 日净值
#
# ⏰ 【关于 cron 时间设置】重要说明：
# GitHub Actions 免费仓库的 schedule cron 不保证准点运行，实测延迟 10min~4h，
# 高峰期（整点 :00 / 半点 :30 + 晚间 21~23 点）排队最严重。
#
# 【本项目采用的策略】提前 4 小时设 cron，期望偏移后落在期望跑点：
#   - cron 设 '30 09 UTC'（北京 17:30）→ 利用 GitHub 延迟，期望运行在北京 21:30 附近
#   - cron 设 '00 17 UTC'（北京 01:00）→ 期望运行在北京 05:00 附近
#
# 【为什么这么设】
#   实际记录：原本设在北京 21:30 的 cron，结果 23:30+ 仍未起跑，
#   说明晚间高峰延迟可达 2h+，于是手动提前 4h 作为缓冲。
#   越提前 → 越能赶上 21:30 这个期望跑点，但也可能过早（如 17:40 就跑了，
#   净值还没披露）——凌晨那次可作为兜底补拉。
#
# 【“正常”该怎么设】如果你不介意“期望跑点”与“cron 设点”一致：
#   推荐设 '07 14 UTC'（北京 22:07）——避开 :00/:30 高峰，选奇数分钟，
#   实测延迟通常 < 15min，且 22:00 后 QDII 净值披露率 >95%，一次到位。
#   凌晨同理推荐 '53 20 UTC'（北京 04:53）。
#   但本项目选择用“提前 4h”的方式同时能赶上 21:30 这个期望跑点，
#   即使提前跑了拿不到净值，也有凌晨 05:00 那次兜底补拉。
"on":
  schedule:
    # 增量更新（采用提前 4h 策略对冲 GitHub Actions 高峰延迟，cron 用 UTC）：
    #
    #   ┌─────────────────────┬──────────┬──────────────────┬──────────────────┐
    #   │ cron 字面           │ UTC 时间 │ 北京 cron 设点    │ 期望落点（+4h）  │
    #   ├─────────────────────┼──────────┼──────────────────┼──────────────────┤
    #   │ '30 09 * * 1-5'     │ 周一~五  │ 周一~五 17:30    │ 周一~五 ~21:30   │ 晚间主力
    #   │ '0 17 * * 0-4'      │ 周日~四  │ 周一~五 01:00    │ 周一~五 ~05:00   │ 凌晨兜底
    #   └─────────────────────┴──────────┴──────────────────┴──────────────────┘
    #
    # 注：cron 只保证"不早于"该时间起跑，实际偏移受 Actions 队列影响不可控
    - cron: '30 09 * * 1-5'   # UTC 周一~五 09:30 = 北京 周一~五 17:30 设点 → 期望北京 21:30 落点
    - cron: '0 17 * * 0-4'    # UTC 周日~四 17:00 = 北京 周一~五 01:00 设点 → 期望北京 05:00 落点
    # 完整流水线：每月 1 日 UTC 18:00 = 每月 2 日北京 02:00
    - cron: '0 18 1 * *'
  # 手动触发
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: '增量更新（快速·净值+申购）'
        type: choice
        options:
          - '增量更新（快速·净值+申购）'
          - '完整流水线（慢·含扫描+持仓）'

# 授权：需要 write 权限才能 commit/push 数据文件回仓库
permissions:
  contents: write

# 防并发：避免多任务同时操作 web/data/ 导致 push 冲突
concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. 拉代码
      - name: 📥 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. 装 Python
      - name: 🐍 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      # 3. 装依赖
      - name: 📦 安装依赖
        run: |
          cd scripts
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 判断运行模式
      - name: 🧭 判断运行模式
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ inputs.mode }}"
            if [[ "$INPUT" == *"完整"* ]]; then
              echo "mode=full" >> $GITHUB_OUTPUT
            else
              echo "mode=incremental" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ github.event.schedule }}" = "0 18 1 * *" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=incremental" >> $GITHUB_OUTPUT
          fi
          echo "✅ 运行模式: $(grep mode $GITHUB_OUTPUT | cut -d= -f2)"

      # 5a. 增量更新（快，~3 分钟）
      #     fill_missing.py：
      #       - 数据源：lsjz API（优先，快）+ pingzhongdata（备选+历史收益）
      #       - 更新字段：nav / nav_date / daily_change（每日强制覆盖）
      #                   chg_1m / chg_3m / chg_6m / chg_1y（仅填空）
      #                   chg_ytd（AKShare 推算）
      #                   mgmt_fee / custody_fee / sale_service_fee（F10 补漏）
      #       - 策略：场外 QDII 无条件刷新净值；ETF 仅补历史收益；防回退（nav_date 只进不退）
      #     refresh_purchase.py：
      #       - 数据源：AKShare 批量接口（秒级拉全量）
      #       - 更新字段：buy_status / sell_status / daily_limit / buy_min / fee
      #                   nav / nav_date / daily_change / chg_1m~3y / chg_ytd / chg_since_inception
      #       - 策略：三数据源兜底——lsjz → pzd → rank，确保净值不遗漏
      - name: ⚡ 增量更新（净值 + 申购状态）
        if: steps.mode.outputs.mode == 'incremental'
        run: |
          cd scripts
          echo "=== [1/2] fill_missing.py（净值 + 涨跌幅 + YTD + 费率补漏）==="
          python fill_missing.py
          echo "=== [2/2] refresh_purchase.py（申购状态 + 限额 + 涨跌幅兜底）==="
          python refresh_purchase.py

      # 5b. 完整流水线（慢，~12 分钟）
      #     重新扫描基金池 + 补全所有字段 + 更新持仓
      - name: 🚀 完整流水线（扫描 + 补全 + 持仓）
        if: steps.mode.outputs.mode == 'full'
        run: |
          cd scripts
          echo "=== [1/5] scan_funds.py（扫描 + 分类）==="
          python scan_funds.py
          echo "=== [2/5] enrich_data.py（规模 + 费率 + 基金经理）==="
          python enrich_data.py
          echo "=== [3/5] fill_missing.py（净值 + 涨跌幅）==="
          python fill_missing.py
          echo "=== [4/5] refresh_purchase.py（申购状态 + 限额）==="
          python refresh_purchase.py
          echo "=== [5/5] fetch_holdings.py（主动基金持仓）==="
          python fetch_holdings.py

      # 6. 如果 web/data 有变化，commit 回主分支
      - name: 💾 提交数据变更
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add web/data/
          if git diff --cached --quiet; then
            echo "⚠️  数据无变化，跳过提交"
          else
            TS=$(date -u '+%Y-%m-%d %H:%M UTC')
            MODE="${{ steps.mode.outputs.mode }}"
            if [ "$MODE" = "full" ]; then
              git commit -m "chore(data): 完整更新 @ $TS"
            else
              git commit -m "chore(data): 增量更新 @ $TS"
            fi
            git push
            echo "✅ 数据已更新并推送"
            
            # 触发网页部署：用 --allow-empty 确保即使无文件变更也能 commit
            git commit --allow-empty -m "chore(deploy): 触发网页部署"
            git push
            echo "✅ 网页部署已触发"
          fi
