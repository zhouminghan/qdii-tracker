name: 🔄 更新基金数据

# 自动更新基金数据 workflow（含 Pages 部署 + 部署后自检）
# 触发：工作日 22:00 增量 + 每月 2 日完整 + 手动
# QDII 净值披露节奏：T 日美股收盘 → T+1 日晚间（北京时间）基金公司披露 T 日净值
#
# ⏰ 【关于 cron 时间设置】
#   22:00（北京时间）：大多数基金已披露，少量延迟交给前端实时 overlay 兜底
#   实时兜底：offshore-live-nav.js 在 15:00~次日06:00 提供实时净值 overlay
#
# 🔗 【部署链路 · 关键】数据更新与 Pages 部署在同一 job 内原子完成，
#    不再依赖 workflow_run 跨 workflow 串联（该事件不稳定，曾导致"仓库新、网页旧"反复出现）。
#    部署后立即 curl 线上 meta.json 自检，不一致则红 + 开 Issue 告警。
"on":
  schedule:
    # 增量更新（cron 用 UTC）：
    #   '0 14 * * 1-5'  UTC 周一~五 14:00 = 北京 周一~五 22:00（晚间更新）
    #   '0 18 1 * *'    每月 1 日 UTC 18:00 = 每月 2 日北京 02:00（完整流水线）
    # 注：schedule 仅保证不早于该时刻起跑，实际仍可能有队列延迟。
    - cron: '0 14 * * 1-5'
    - cron: '0 18 1 * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: '增量更新（快速·净值+申购）'
        type: choice
        options:
          - '增量更新（快速·净值+申购）'
          - '完整流水线（慢·含扫描+持仓）'

# 授权：contents（commit/push）+ pages/id-token（部署 Pages）+ issues（自检失败开 Issue）
permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

# 防并发：避免多任务同时操作 web/data/ 导致 push 冲突
concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. 拉代码
      - name: 📥 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. 装 Python
      - name: 🐍 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      # 3. 装依赖
      - name: 📦 安装依赖
        run: |
          cd scripts
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 判断运行模式
      - name: 🧭 判断运行模式
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ inputs.mode }}"
            if [[ "$INPUT" == *"完整"* ]]; then
              echo "mode=full" >> $GITHUB_OUTPUT
            else
              echo "mode=incremental" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ github.event.schedule }}" = "0 18 1 * *" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=incremental" >> $GITHUB_OUTPUT
          fi
          echo "✅ 运行模式: $(grep mode $GITHUB_OUTPUT | cut -d= -f2)"

      # 5a. 增量更新（快，~3 分钟）
      - name: ⚡ 增量更新（净值 + 申购状态）
        if: steps.mode.outputs.mode == 'incremental'
        run: |
          cd scripts
          echo "=== [1/2] pipeline.fill（净值 + 涨跌幅 + YTD + 费率补漏）==="
          python -m pipeline.fill
          echo "=== [2/2] pipeline.refresh（申购状态 + 限额 + 涨跌幅兜底）==="
          python -m pipeline.refresh

      # 5b. 完整流水线（慢，~12 分钟）
      - name: 🚀 完整流水线（扫描 + 补全 + 持仓）
        if: steps.mode.outputs.mode == 'full'
        run: |
          cd scripts
          echo "=== [1/5] pipeline.scan（扫描 + 分类）==="
          python -m pipeline.scan
          echo "=== [2/5] pipeline.enrich（规模 + 费率 + 基金经理）==="
          python -m pipeline.enrich
          echo "=== [3/5] pipeline.fill（净值 + 涨跌幅）==="
          python -m pipeline.fill
          echo "=== [4/5] pipeline.refresh（申购状态 + 限额）==="
          python -m pipeline.refresh
          echo "=== [5/5] pipeline.holdings（主动基金持仓）==="
          python -m pipeline.holdings

      - name: ✅ 一致性校验
        run: |
          cd scripts
          python fundctl.py check

      # 6. 提交数据变更（输出 changed 标记，供后续部署步骤判断）
      - name: 💾 提交数据变更
        id: commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add web/data/
          if git diff --cached --quiet; then
            echo "⚠️  数据无变化，跳过提交与部署"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            TS=$(date -u '+%Y-%m-%d %H:%M UTC')
            MODE="${{ steps.mode.outputs.mode }}"
            if [ "$MODE" = "full" ]; then
              git commit -m "chore(data): 完整更新 @ $TS"
            else
              git commit -m "chore(data): 增量更新 @ $TS"
            fi
            git pull --rebase origin main
            git push
            echo "✅ 数据已更新并推送"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # ─────── 以下为 Pages 部署（仅在有数据变更时执行）───────
      # why 原子化：数据 push 后立即在同一 job 部署，消除 workflow_run 串联的不稳定性

      - name: 🏷️ 记录本次预期 generated_at
        if: steps.commit.outputs.changed == 'true'
        id: expected
        run: |
          GA=$(python3 -c "import json;print(json.load(open('web/data/meta.json'))['generated_at'])")
          echo "ga=$GA" >> $GITHUB_OUTPUT
          echo "本次推送的 meta.generated_at = $GA"

      - name: ⚙️ Setup Pages
        if: steps.commit.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: 🏷️ Stamp frontend asset versions
        if: steps.commit.outputs.changed == 'true'
        run: |
          SHA=$(git rev-parse HEAD)
          python3 scripts/pipeline/stamp_asset_version.py --version "${SHA::12}"

      - name: 📦 Upload web/ as artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: './web'

      - name: 🚀 Deploy to GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      # 7. 部署后端到端自检：curl 线上 meta.json，断言 generated_at == 本次推送值
      #    这是"杜绝再发"的核心——部署了 ≠ 部署对了，必须回验线上实际生效内容
      - name: 🔍 部署后自检（线上 meta.generated_at）
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 45
          EXPECTED="${{ steps.expected.outputs.ga }}"
          echo "预期 generated_at: $EXPECTED"
          ACTUAL=$(curl -fsSL "https://zhouminghan.github.io/qdii-tracker/data/meta.json?nocache=$(date +%s)" \
            | python3 -c "import sys,json;print(json.load(sys.stdin)['generated_at'])" 2>/dev/null || echo "")
          echo "线上 generated_at: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "❌ 无法获取线上 meta.json"
            exit 1
          fi
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "❌ 自检失败：线上 ($ACTUAL) ≠ 本次推送 ($EXPECTED)"
            echo "   Pages CDN 可能未更新或部署未生效，创建告警 Issue..."
            gh issue create \
              --title "🚨 Pages 部署自检失败 @ $(date -u '+%Y-%m-%d %H:%M UTC')" \
              --body "线上 \`meta.generated_at\` = \`$ACTUAL\`，本次推送 = \`$EXPECTED\`。

          部署 workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          可能原因：Pages CDN 延迟、部署未生效。请检查 https://zhouminghan.github.io/qdii-tracker/ 或重跑 workflow。" \
              || echo "(创建 Issue 失败，忽略)"
            exit 1
          fi
          echo "✅ 自检通过：线上数据已是最新"

      - name: ℹ️ 跳过部署（数据无变化）
        if: steps.commit.outputs.changed != 'true'
        run: echo "数据无变化，未部署 Pages。"
