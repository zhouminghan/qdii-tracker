name: 🔄 更新基金数据

# 自动更新基金数据 workflow
# 触发：工作日多时段增量 + 每月 2 日完整 + 手动
# 多时段：05:00 / 17:30 / 22:30（北京时间）→ 凌晨补漏 + 午后 + 晚间
# QDII 净值披露节奏：T 日美股收盘 → T+1 日晚间（北京时间）基金公司披露 T 日净值
# 注：GitHub Actions cron 免费仓库延迟 10min~4h，05:00 提前量确保约 09:00 前跑完
"on":
  schedule:
    # 增量更新（北京时间 = UTC+8）：
    #   北京 22:00 = UTC 14:00 → 晚间主力（QDII 净值 T+1 披露，多数基金 21:00~22:00 出）
    #   北京 05:00 = UTC 21:00（前一天）→ 凌晨兜底（补拉前一晚遗漏）
    - cron: '0 14 * * 1-5'
    - cron: '0 21 * * 0-4'
    # 每月 2 日凌晨 2:00 北京 = UTC 18:00 于 1 日，跑"完整流水线"
    - cron: '0 18 1 * *'
  # 手动触发
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: '增量更新（快速·净值+申购）'
        type: choice
        options:
          - '增量更新（快速·净值+申购）'
          - '完整流水线（慢·含扫描+持仓）'

# 授权：需要 write 权限才能 commit/push 数据文件回仓库
permissions:
  contents: write

# 防并发：避免多任务同时操作 web/data/ 导致 push 冲突
concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. 拉代码
      - name: 📥 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. 装 Python
      - name: 🐍 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      # 3. 装依赖
      - name: 📦 安装依赖
        run: |
          cd scripts
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 判断运行模式
      - name: 🧭 判断运行模式
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ inputs.mode }}"
            if [[ "$INPUT" == *"完整"* ]]; then
              echo "mode=full" >> $GITHUB_OUTPUT
            else
              echo "mode=incremental" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ github.event.schedule }}" = "0 18 1 * *" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=incremental" >> $GITHUB_OUTPUT
          fi
          echo "✅ 运行模式: $(grep mode $GITHUB_OUTPUT | cut -d= -f2)"

      # 5a. 增量更新（快，~3 分钟）
      #     fill_missing.py：
      #       - 数据源：lsjz API（优先，快）+ pingzhongdata（备选+历史收益）
      #       - 更新字段：nav / nav_date / daily_change（每日强制覆盖）
      #                   chg_1m / chg_3m / chg_6m / chg_1y（仅填空）
      #                   chg_ytd（AKShare 推算）
      #                   mgmt_fee / custody_fee / sale_service_fee（F10 补漏）
      #       - 策略：场外 QDII 无条件刷新净值；ETF 仅补历史收益；防回退（nav_date 只进不退）
      #     refresh_purchase.py：
      #       - 数据源：AKShare 批量接口（秒级拉全量）
      #       - 更新字段：buy_status / sell_status / daily_limit / buy_min / fee
      #                   nav / nav_date / daily_change / chg_1m~3y / chg_ytd / chg_since_inception
      #       - 策略：三数据源兜底——lsjz → pzd → rank，确保净值不遗漏
      - name: ⚡ 增量更新（净值 + 申购状态）
        if: steps.mode.outputs.mode == 'incremental'
        run: |
          cd scripts
          echo "=== [1/2] fill_missing.py（净值 + 涨跌幅 + YTD + 费率补漏）==="
          python fill_missing.py
          echo "=== [2/2] refresh_purchase.py（申购状态 + 限额 + 涨跌幅兜底）==="
          python refresh_purchase.py

      # 5b. 完整流水线（慢，~12 分钟）
      #     重新扫描基金池 + 补全所有字段 + 更新持仓
      - name: 🚀 完整流水线（扫描 + 补全 + 持仓）
        if: steps.mode.outputs.mode == 'full'
        run: |
          cd scripts
          echo "=== [1/5] scan_funds.py（扫描 + 分类）==="
          python scan_funds.py
          echo "=== [2/5] enrich_data.py（规模 + 费率 + 基金经理）==="
          python enrich_data.py
          echo "=== [3/5] fill_missing.py（净值 + 涨跌幅）==="
          python fill_missing.py
          echo "=== [4/5] refresh_purchase.py（申购状态 + 限额）==="
          python refresh_purchase.py
          echo "=== [5/5] fetch_holdings.py（主动基金持仓）==="
          python fetch_holdings.py

      # 6. 如果 web/data 有变化，commit 回主分支
      - name: 💾 提交数据变更
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add web/data/
          if git diff --cached --quiet; then
            echo "⚠️  数据无变化，跳过提交"
          else
            TS=$(date -u '+%Y-%m-%d %H:%M UTC')
            MODE="${{ steps.mode.outputs.mode }}"
            if [ "$MODE" = "full" ]; then
              git commit -m "chore(data): 完整更新 @ $TS"
            else
              git commit -m "chore(data): 增量更新 @ $TS"
            fi
            git push
            echo "✅ 数据已更新并推送"
          fi
