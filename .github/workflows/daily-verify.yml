name: 🔎 每日数据新鲜度校验

# 每天北京时间 09:00（UTC 01:00）纯只读校验线上 Pages 的 meta.generated_at 是否陈旧。
# 这是"部署链路回归监控"——即使 update-data.yml 的自检某天失效，
# 本 workflow 也能在第二天上午自动暴露"线上停在旧数据"的问题，开 Issue 告警。
#
# 判定规则（北京时间）：
#   · 周末（六/日）不报警（美股周末无交易，数据本就不更新）
#   · 工作日：若 generated_at 距今 > 50h → 陈旧（覆盖"昨晚该更新却没更新"）
#     - 周一 09:00：上周五晚数据 age ≈ 32h < 50h，正常 ✓
#     - 周二 09:00：若周一晚更新失败 age ≈ 56h > 50h，报警 ✓
"on":
  schedule:
    - cron: '0 1 * * *'    # UTC 每天 01:00 = 北京每天 09:00
  workflow_dispatch:

permissions:
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 校验线上 meta.generated_at 新鲜度
        run: |
          python3 - <<'PY'
          import json, sys, os, urllib.request
          from datetime import datetime, timezone, timedelta

          BJ = timezone(timedelta(hours=8))
          now = datetime.now(BJ)

          url = "https://zhouminghan.github.io/qdii-tracker/data/meta.json?nocache=" + str(int(now.timestamp()))
          try:
              with urllib.request.urlopen(url, timeout=20) as resp:
                  meta = json.load(resp)
          except Exception as e:
              print(f"❌ 无法获取线上 meta.json: {e}")
              sys.exit(1)

          ga_str = meta.get("generated_at", "")
          if not ga_str:
              print("❌ meta.json 缺少 generated_at 字段")
              sys.exit(1)

          try:
              ga = datetime.fromisoformat(ga_str)
              if ga.tzinfo is None:
                  ga = ga.replace(tzinfo=BJ)
          except Exception:
              print(f"❌ 无法解析 generated_at: {ga_str}")
              sys.exit(1)

          age_h = (now - ga).total_seconds() / 3600
          weekday = now.weekday()  # 0=周一 ... 6=周日
          is_weekend = weekday >= 5

          print(f"现在（北京）: {now.isoformat()}")
          print(f"线上 generated_at: {ga_str}")
          print(f"数据 age: {age_h:.1f}h")

          if is_weekend:
              print("✅ 周末不校验（美股无交易，数据本就不更新）")
              sys.exit(0)

          # 找"最近一个已完成 run"的完成日凌晨 00:00（北京）
          # run 在工作日 22:00 启动、次日 ~04:00 前完成并写 generated_at
          # why 不用固定 age 阈值：周末 gap 使周一数据天然 age≈56h，固定阈值会误报或漏报；
          #     按"预期更新点"判断才能区分"周一正常的周五数据"与"周二该更新却没更新"
          from datetime import time as dtime
          expected_min = None
          for days_back in range(8):
              run_day = now.date() - timedelta(days=days_back)
              if run_day.weekday() >= 5:  # 周末不跑 run
                  continue
              completion = datetime.combine(run_day + timedelta(days=1), dtime(4, 0), tzinfo=BJ)
              if completion <= now:
                  expected_min = datetime.combine(run_day + timedelta(days=1), dtime(0, 0), tzinfo=BJ)
                  break
          if expected_min is None:
              print("⚠️ 无法确定预期更新点，跳过")
              sys.exit(0)

          lower_bound = expected_min - timedelta(hours=6)
          print(f"预期 generated_at 不早于: {lower_bound.isoformat()}")

          if ga < lower_bound:
              print(f"❌ 数据陈旧：generated_at {ga.isoformat()} 早于下界 {lower_bound.isoformat()}")
              with open(os.environ.get("GITHUB_ENV", "/dev/null"), "a") as f:
                  f.write("STALE=true\n")
                  f.write(f"STALE_AGE_H={age_h:.1f}\n")
                  f.write(f"STALE_GA={ga_str}\n")
              sys.exit(1)
          else:
              print(f"✅ 数据新鲜：generated_at {ga.isoformat()} ≥ 下界 {lower_bound.isoformat()}")
          PY

      - name: 🚨 陈旧告警（开 Issue）
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "🚨 线上数据陈旧告警 @ $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --body "每日新鲜度校验发现线上 Pages 数据陈旧。

          - 线上 \`meta.generated_at\`：\`$STALE_GA\`
          - 距今约 \`$STALE_AGE_H\` 小时（阈值 50h）

          请检查：
          1. update-data.yml 最近一次运行是否成功：https://github.com/${{ github.repository }}/actions
          2. 线上页面：https://zhouminghan.github.io/qdii-tracker/
          3. 必要时手动重跑 update-data.yml

          校验 workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            || echo "(创建 Issue 失败，忽略)"
